<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Tech | O Futuro do Código</title>
    <style>
        /* Reset e Base Dark */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0e14; 
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Principal */
        .card-portal {
            max-width: 500px;
            width: 100%;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 24px;
            overflow: visible; /* Permite que a logo saia um pouco para fora */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Header Curvo Moderno */
        .header-tech {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            padding: 50px 20px;
            text-align: center;
            color: #fff;
            border-radius: 24px 24px 0 0;
        }

        .header-tech h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* CONFIGURAÇÃO DA LOGO (A imagem que você enviou) */
        .logo-container {
            display: flex;
            justify-content: center;
            margin-top: -50px; /* Faz a logo subir para cima do azul */
        }

        .img-logo {
            width: 120px;       /* Tamanho menor e controlado */
            height: 120px;
            object-fit: contain; /* Garante que a logo não distorça */
            background: #161b22;
            padding: 15px;
            border-radius: 50%;
            border: 4px solid #161b22;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Conteúdo */
        .main-content {
            padding: 20px 30px 40px 30px;
            text-align: center;
        }

        .tag {
            color: #00d2ff;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            display: block;
            margin-bottom: 10px;
        }

        .artigo h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #fff;
        }

        .meta-info {
            font-size: 0.8rem;
            color: #8b949e;
            margin-bottom: 20px;
        }

        .resumo {
            line-height: 1.6;
            color: #afbac4;
            margin-bottom: 30px;
        }

        /* Botões de Like/Fogo */
        .botoes-acao {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: #30363d;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="card-portal">
        <header class="header-tech">
            <h1>Nexus Tech</h1>
            <p>Conectando ideias ao futuro</p>
        </header>

        <!-- AREA DA LOGO -->
        <div class="logo-container">
            <!-- COLOQUE O NOME DO SEU ARQUIVO DE IMAGEM NO SRC ABAIXO -->
            <img src="logo.jpg" class="img-logo" alt="Logo de Tecnologia">
        </div>

        <main class="main-content">
            <article class="artigo">
                <span class="tag">Inovação • Web Dev</span>
                <h2>Explorando a Web 3.0</h2>
                <p class="meta-info">Postado por <strong>Julia Dorociaki</strong></p>
                
                <p class="resumo">
                    Como a descentralização está mudando a forma como construímos 
                    interfaces e gerenciamos dados de usuários no dia a dia.
                </p>

                <div class="botoes-acao">
                    <button class="btn">❤️ <span>28</span></button>
                    <button class="btn">🔥 <span>15</span></button>
                </div>
            </article>
        </main>
    </div>

</body>
</html>
